name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json
      - src-tauri/Cargo.toml
      - src-tauri/tauri.conf.json
      - CHANGELOG.md

jobs:
  build-macos:
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure bundled 7z is executable
        run: chmod +x src-tauri/binaries/7z

      - name: Set updater signing env
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY=${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> "$GITHUB_ENV"

      - name: Build Tauri bundles
        env:
          CI: false
          TAURI_BUNDLER_DMG_IGNORE_CI: false
        run: pnpm tauri build --bundles app,dmg --target ${{ matrix.target }}

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve bundle paths
        id: bundle_paths
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)
          TAR_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' -print -quit)
          SIG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz.sig' -print -quit)
          STABLE_DMG=$(dirname "$DMG_PATH")/Crimson-Desert-Mod-Manager-macOS-arm64-latest.dmg
          cp "$DMG_PATH" "$STABLE_DMG"
          LATEST_JSON=$(dirname "$DMG_PATH")/latest.json
          APP_BASENAME=$(basename "$TAR_PATH")
          SIG_CONTENT=$(cat "$SIG_PATH")
          cat > "$LATEST_JSON" <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "notes": "See the GitHub release notes for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG_CONTENT",
                "url": "https://github.com/DarthGigi/Crimson-Desert-macOS-Mod-Manager/releases/download/v${{ steps.version.outputs.version }}/$APP_BASENAME"
              }
            }
          }
          EOF
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "stable_dmg=$STABLE_DMG" >> "$GITHUB_OUTPUT"
          echo "latest_json=$LATEST_JSON" >> "$GITHUB_OUTPUT"
          {
            echo 'updater_artifacts<<EOF'
            echo "$TAR_PATH"
            echo "$SIG_PATH"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Crimson-Desert-Mod-Manager-${{ matrix.arch }}-app
          path: ${{ steps.bundle_paths.outputs.app_path }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: Crimson-Desert-Mod-Manager-${{ matrix.arch }}-dmg
          path: ${{ steps.bundle_paths.outputs.dmg_path }}

      - name: Upload stable latest dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: Crimson-Desert-Mod-Manager-${{ matrix.arch }}-dmg-latest
          path: ${{ steps.bundle_paths.outputs.stable_dmg }}

      - name: Upload updater metadata
        if: steps.bundle_paths.outputs.latest_json != ''
        uses: actions/upload-artifact@v7
        with:
          name: Crimson-Desert-Mod-Manager-${{ matrix.arch }}-updater
          path: |
            ${{ steps.bundle_paths.outputs.latest_json }}
            ${{ steps.bundle_paths.outputs.updater_artifacts }}

      - name: Attest app artifact
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.bundle_paths.outputs.app_path }}

      - name: Attest dmg artifact
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.bundle_paths.outputs.dmg_path }}
            ${{ steps.bundle_paths.outputs.stable_dmg }}

      - name: Attest updater artifacts
        if: steps.bundle_paths.outputs.latest_json != ''
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.bundle_paths.outputs.latest_json }}
            ${{ steps.bundle_paths.outputs.updater_artifacts }}

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Crimson Desert Mod Manager v${{ steps.version.outputs.version }}
          files: |
            ${{ steps.bundle_paths.outputs.app_path }}
            ${{ steps.bundle_paths.outputs.dmg_path }}
            ${{ steps.bundle_paths.outputs.stable_dmg }}
            ${{ steps.bundle_paths.outputs.latest_json }}
            ${{ steps.bundle_paths.outputs.updater_artifacts }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Unsigned macOS builds.

            These bundles are ad-hoc signed and may still require Gatekeeper bypass on first launch.
